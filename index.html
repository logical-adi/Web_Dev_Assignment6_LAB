<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Manager</title>

<style>
body {
    font-family: Arial;
    background-color: #f4f4f4;
    text-align: center;
}

.container {
    width: 350px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 50px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input {
    width: 90%;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 5px 10px;
    margin: 5px;
    cursor: pointer;
}

.contact {
    background: #e3e3e3;
    margin: 5px;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
    <h2>Contact Manager</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="phone" placeholder="Enter Phone">

    <br>
    <button onclick="addContact()">Add Contact</button>

    <div id="contactList"></div>
</div>

<script>
let contacts = [];

function addContact() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if (name === "" || phone === "") {
        alert("Please fill all fields");
        return;
    }

    contacts.push({ name: name, phone: phone });
    displayContacts();

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}

function displayContacts() {
    let list = document.getElementById("contactList");
    list.innerHTML = "";

    contacts.forEach((contact, index) => {
        list.innerHTML += `
            <div class="contact">
                <b>${contact.name}</b> - ${contact.phone} <br>

                <button onclick="editContact(${index})">Edit</button>
                <button onclick="deleteContact(${index})">Delete</button>
                <button onclick="renameContact(${index})">Rename</button>
            </div>
        `;
    });
}

function deleteContact(index) {
    contacts.splice(index, 1);
    displayContacts();
}

function editContact(index) {
    let newName = prompt("Enter new name:", contacts[index].name);
    let newPhone = prompt("Enter new phone:", contacts[index].phone);

    if (newName && newPhone) {
        contacts[index].name = newName;
        contacts[index].phone = newPhone;
        displayContacts();
    }
}

function renameContact(index) {
    let newName = prompt("Enter new name:", contacts[index].name);

    if (newName) {
        contacts[index].name = newName;
        displayContacts();
    }
}
</script>

</body>
</html>
